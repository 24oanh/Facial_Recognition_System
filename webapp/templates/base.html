<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }} | Face Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img
          src="{{ url_for('static', filename='css/images/logo.png') }}"
          alt="Project logo"
        />
        <div class="logo-copy">
          <b>TRƯỜNG ĐẠI HỌC CÔNG NGHỆ KỸ THUẬT TP.HCM</b><br />
          <span>Web demo nhận dạng khuôn mặt - Đồ án cuối kỳ môn học: Toán cho Trí tuệ nhân tạo</span>
        </div>
      </div>

      <nav>
        <a href="/" class="{{ 'active' if active == 'home' }}">Nhận dạng</a>
        <a href="/realtime" class="{{ 'active' if active == 'realtime' }}"
          >Realtime</a
        >
        <a
          href="/database-builder"
          class="{{ 'active' if active == 'database_builder' }}"
          >Database Builder</a
        >
        <a href="/about" class="{{ 'active' if active == 'about' }}">About</a>
      </nav>
    </header>

    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
